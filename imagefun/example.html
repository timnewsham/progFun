<!DOCTYPE html>
<html>
<head>
<script src="engine.js"></script>
<script>

// text returns text to display at time t for engine e.
function text(e, t) {
    var txt = `time: ${t.toFixed(2)} sec`;
    txt += `\nframe: ${e.frame}`;
    if(t > 0) {
        const rate = e.frame / t;
        txt += `\nrate: ${rate.toFixed(2)} frames/sec`;
    }
    return txt;
}

// color returns a color for each pixel position x,y in range 0..1, and time t in seconds.
function color(e, x, y, t) {
	if(x == 0 || y == 0 || x == 1 || y == 1) {
		return black;
	}

    const xx = x - 0.5;
    const yy = y - 0.5;
    const d = Math.sqrt(xx*xx + yy*yy);

    const rad = 0.1 + 0.1 * (sin1(t / 3.0) + 1.0);
	const altcol = lerpV(e.sliders[0], blue, green);
    if (d < rad) {
        return lerpV(y, red, altcol);
    }
    return avgV(lerpV(x, altcol, red), lerpV(y, black, white));
}

var e;
onload = function() { e = new Engine("#status", "#draw", "#slider1", "#slider2", "#slider3"); }
</script>
<style>
  #container { position: relative; }
  #draw { position: absolute; left: 0; top: 0; z-index: 1; }
  #status { position: absolute; left: 10px; top: 0; z-index: 2; color: yellow; }
  #slider1, #slider2, #slider3 { width: 40%; }
</style>
</head>
<body>
<input type="range" id="slider1" min="0", max="100" value="0"></input><br>
<input type="range" id="slider2" min="0", max="100" value="0"></input><br>
<input type="range" id="slider3" min="0", max="100" value="0"></input><br>
<div id="container">
  <canvas id="draw" width=400 height=400></canvas>
  <p id="status"></p>
</div>
</body>
</html>
